name: Actualizar y publicar tienda JeiperdShop

on:
  # NOTA: el scraping desde la nube NO funciona porque Cloudflare bloquea la API
  # /wp-json desde IPs de servidores (probado con requests y con navegador real).
  # La actualizacion real la hace el robot LOCAL (robot_actualizar.py) que corre
  # en la PC del usuario (IP de confianza) y hace git push. Este flujo queda solo
  # en modo manual por si se necesita en el futuro.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: actualizar-tienda
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar navegador (Playwright Chromium) + xvfb
        run: |
          python -m playwright install --with-deps chromium
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Generar la tienda (con registro)
        run: |
          cd scripts
          set +e
          xvfb-run -a python solve_cloudflare.py 2>&1 | tee ../build.log
          python extraer_portatilshop.py 2>&1 | tee -a ../build.log
          EXTRAER=${PIPESTATUS[0]}
          echo "=== extraer exit: $EXTRAER ===" | tee -a ../build.log
          if [ "$EXTRAER" -eq 0 ]; then
            python generar_tienda.py 2>&1 | tee -a ../build.log
            echo "=== generar exit: ${PIPESTATUS[0]} ===" | tee -a ../build.log
            cp JeiperdShop.html ../index.html
          fi

      - name: Publicar (siempre guarda el log)
        if: always()
        run: |
          git config user.name "JeiperdShop Bot"
          git config user.email "jeiperdsolutions@gmail.com"
          git add index.html build.log
          git commit -m "Actualizacion automatica del catalogo" || echo "Sin cambios"
          git push
