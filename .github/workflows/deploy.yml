name: Actualizar y publicar tienda JeiperdShop

on:
  schedule:
    # 16:00 UTC = 12:00 PM en Republica Dominicana (UTC-4)
    - cron: '0 16 * * *'
  workflow_dispatch:        # permite ejecutarlo a mano desde la pestana Actions

permissions:
  contents: write           # para poder actualizar index.html en el repo

concurrency:
  group: actualizar-tienda
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Extraer catalogo y generar la tienda
        run: |
          cd scripts
          python extraer_portatilshop.py
          python generar_tienda.py
          cp JeiperdShop.html ../index.html

      - name: Publicar cambios (index.html)
        run: |
          git config user.name "JeiperdShop Bot"
          git config user.email "jeiperdsolutions@gmail.com"
          git add index.html
          git commit -m "Actualizacion automatica del catalogo" || echo "Sin cambios que publicar"
          git push
